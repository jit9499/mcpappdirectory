name: 🔨 Build Name Boards APK

on:
  push:
    branches: [ "claude/android-todo-app-F3hmZ" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Get the code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔍 Check Android SDK on this machine
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls /usr/local/lib/android/sdk/build-tools/

      - name: 🔧 Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          echo "Gradle installed:"
          /opt/gradle-8.4/bin/gradle --version

      - name: 📋 Point Gradle to the Android SDK
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > TodoApp/local.properties
          cat TodoApp/local.properties

      - name: 🏗️ Build the APK
        run: /opt/gradle-8.4/bin/gradle :app:assembleDebug --no-daemon --stacktrace
        working-directory: TodoApp
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

      - name: 📤 Upload APK — click here to download!
        uses: actions/upload-artifact@v4
        with:
          name: NameBoards-App
          path: TodoApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
