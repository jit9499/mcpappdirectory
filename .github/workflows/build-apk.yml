name: 🔨 Build Name Boards APK

on:
  push:
    branches: [ "claude/android-todo-app-F3hmZ" ]
  workflow_dispatch:   # allows clicking "Run" manually on GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download the code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: 📋 Tell Gradle where the Android SDK is
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > TodoApp/local.properties

      - name: 🏗️ Build the APK
        run: gradle :app:assembleDebug --no-daemon
        working-directory: TodoApp

      - name: 📤 Upload APK for download
        uses: actions/upload-artifact@v4
        with:
          name: NameBoards-App
          path: TodoApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
