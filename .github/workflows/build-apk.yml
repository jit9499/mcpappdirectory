name: 🔨 Build Name Boards APK

on:
  push:
    branches: [ "claude/android-todo-app-F3hmZ" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download the code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: 🔍 Find Android SDK location
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls /usr/local/lib/android/sdk/build-tools/ || echo "No build-tools at default path"

      - name: 📋 Tell Gradle where the Android SDK is
        run: |
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "sdk.dir=$SDK" > TodoApp/local.properties
          echo "Written: $(cat TodoApp/local.properties)"

      - name: 🏗️ Build the APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace
        working-directory: TodoApp
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: 📤 Upload APK for download
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NameBoards-App
          path: TodoApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
